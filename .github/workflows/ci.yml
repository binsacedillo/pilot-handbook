name: "CI Foundation"

on: [push, pull_request]

jobs:
  verify:
    name: "Code Safety Checks"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pilot-handbook
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: "true"
      NEXTAUTH_URL: http://localhost:8080
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pilot-handbook
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmstc2V0dXAuaWQubGNsLmNsdWRnZS5jb20k
      CLERK_SECRET_KEY: sk_test_clerk_dummy_secret_key_12345
      PORT: 8080
      NEXT_PUBLIC_E2E: true
      NODE_TLS_REJECT_UNAUTHORIZED: 0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install Dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Wait for Postgres
        run: sleep 5

      - name: Prisma DB Push
        run: npx prisma db push --accept-data-loss

      - name: Prisma Validate
        run: npx prisma validate

      - name: Type Check (Fail-Fast)
        run: npm run typecheck

      - name: Linting
        run: npm run lint

      - name: Unit Tests
        run: npm run test

      - name: Build Check
        run: npm run build

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Run E2E Tests (Phase 5)
        run: npm run test:e2e

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
